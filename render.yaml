services:
  - type: web
    name: test01-backend
    runtime: python
    buildCommand: apt-get install -y fonts-ipafont && pip install -r template/requirements.txt
    startCommand: cd template && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
